services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: cuttlegate
      POSTGRES_PASSWORD: cuttlegate
      POSTGRES_DB: cuttlegate
    ports:
      - "5432:5432"
    volumes:
      - cuttlegate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuttlegate"]
      interval: 2s
      timeout: 5s
      retries: 10

  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./deploy/dex/config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    entrypoint: ["/migrate", "up"]
    environment:
      DATABASE_URL: postgres://cuttlegate:cuttlegate@db:5432/cuttlegate?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      DATABASE_URL: postgres://cuttlegate:cuttlegate@db:5432/cuttlegate?sslmode=disable
      OIDC_ISSUER: http://localhost:5556/dex
      OIDC_CLIENT_ID: cuttlegate
      OIDC_REDIRECT_URI: http://localhost:8080/callback
      ADDR: ":8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      dex:
        condition: service_healthy

volumes:
  cuttlegate_data:
