services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: cuttlegate
      POSTGRES_PASSWORD: cuttlegate
      POSTGRES_DB: cuttlegate
    ports:
      - "5432:5432"
    volumes:
      - cuttlegate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuttlegate"]
      interval: 2s
      timeout: 5s
      retries: 10

  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./deploy/dex/config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    entrypoint: ["/migrate", "up"]
    environment:
      DATABASE_URL: postgres://cuttlegate:cuttlegate@db:5432/cuttlegate?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      DATABASE_URL: postgres://cuttlegate:cuttlegate@db:5432/cuttlegate?sslmode=disable
      OIDC_ISSUER: http://localhost:5556/dex
      OIDC_CLIENT_ID: cuttlegate
      OIDC_REDIRECT_URI: http://localhost:8080/callback
      OIDC_ROLE_CLAIM: name
      ADDR: ":8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      dex:
        condition: service_healthy

  keyline-db:
    image: postgres:17
    environment:
      POSTGRES_USER: keyline
      POSTGRES_PASSWORD: keyline
      POSTGRES_DB: keyline
    volumes:
      - keyline_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyline"]
      interval: 2s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.1.4
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  keyline:
    image: ghcr.io/the127/keyline:v0.2.2
    command: ["/app/api", "--config", "/app/config.yml"]
    volumes:
      - ./deploy/keyline/config.yml:/app/config.yml:ro,z
      - keyline_keys:/app/keys
    ports:
      - "5002:8080"
    depends_on:
      keyline-db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/oidc/keyline/.well-known/openid-configuration"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  cuttlegate_data:
  keyline_data:
  keyline_keys:
