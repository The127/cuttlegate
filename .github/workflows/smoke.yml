name: Smoke

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'deploy/**'
      - 'Dockerfile'
      - 'Justfile'
      - 'scripts/smoke.sh'
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'deploy/**'
      - 'Dockerfile'
      - 'Justfile'
      - 'scripts/smoke.sh'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - name: Smoke test the compose stack
        run: just smoke
