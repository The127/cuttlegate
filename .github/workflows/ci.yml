name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cuttlegate
          POSTGRES_PASSWORD: cuttlegate
          POSTGRES_DB: cuttlegate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@v2

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Unit tests (includes architecture import rules)
        run: just test

      - name: Integration tests
        env:
          DATABASE_URL: postgres://cuttlegate:cuttlegate@localhost:5432/cuttlegate_test?sslmode=disable
        run: just test-integration

  sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  sdk-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod

      - uses: extractions/setup-just@v2

      - name: Go SDK tests
        run: just test-sdk-go

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: extractions/setup-just@v2

      - name: Install Python SDK dev dependencies
        run: pip install -e 'sdk/python/[dev]'

      - name: Python SDK tests
        run: just test-sdk-python

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: extractions/setup-just@v2

      - name: Install Playwright browsers
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: E2E tests
        run: just test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload test artifacts (traces, screenshots, video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
