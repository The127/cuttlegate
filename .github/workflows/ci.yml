name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cuttlegate
          POSTGRES_PASSWORD: cuttlegate
          POSTGRES_DB: cuttlegate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@v2

      - name: Lint
        uses: golangci/golangci-lint-action@v6

      - name: Unit tests (includes architecture import rules)
        run: just test

      - name: Integration tests
        env:
          DATABASE_URL: postgres://cuttlegate:cuttlegate@localhost:5432/cuttlegate_test?sslmode=disable
        run: just test-integration
