<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Monochrome variant for dark backgrounds -->
  <!-- Body -->
  <ellipse cx="64" cy="52" rx="32" ry="28" fill="currentColor" opacity="0.9"/>
  <!-- Mantle/head bump -->
  <ellipse cx="64" cy="32" rx="22" ry="14" fill="currentColor"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="48" rx="8" ry="9" fill="white"/>
  <ellipse cx="76" cy="48" rx="8" ry="9" fill="white"/>
  <ellipse cx="53" cy="49" rx="4" ry="5" fill="#1a1a2e"/>
  <ellipse cx="77" cy="49" rx="4" ry="5" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="55" cy="47" r="1.5" fill="white"/>
  <circle cx="79" cy="47" r="1.5" fill="white"/>
  <!-- W-shaped pupils -->
  <ellipse cx="53" cy="50" rx="2.5" ry="1" fill="#0a0a1a"/>
  <ellipse cx="77" cy="50" rx="2.5" ry="1" fill="#0a0a1a"/>
  <!-- Tentacles -->
  <path d="M42 72 Q38 90 30 96" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M48 74 Q46 92 42 100" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M56 76 Q55 94 52 102" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M64 77 Q64 96 64 104" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M72 76 Q73 94 76 102" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M80 74 Q82 92 86 100" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M86 72 Q90 90 98 96" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Grabbing tentacles -->
  <path d="M46 75 Q32 88 26 102 Q24 108 28 110" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M82 75 Q96 88 102 102 Q104 108 100 110" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Spots -->
  <circle cx="52" cy="62" r="2.5" fill="currentColor" opacity="0.4"/>
  <circle cx="76" cy="62" r="2.5" fill="currentColor" opacity="0.4"/>
  <circle cx="64" cy="66" r="2" fill="currentColor" opacity="0.3"/>
  <!-- Side fins -->
  <path d="M32 48 Q22 50 28 60 Q32 56 32 52" fill="currentColor" opacity="0.7"/>
  <path d="M96 48 Q106 50 100 60 Q96 56 96 52" fill="currentColor" opacity="0.7"/>
  <!-- Smile -->
  <path d="M58 56 Q64 60 70 56" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
