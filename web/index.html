<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <title>Cuttlegate</title>
    <script>
      // Flash-prevention: read theme preference from localStorage and apply
      // the appropriate class on <html> before first paint.
      // Values: "light", "dark", "system" (or absent). Invalid values → system.
      ;(function () {
        try {
          var pref = localStorage.getItem('cg:theme.preference')
          if (pref === 'light') document.documentElement.classList.add('theme-light')
          else if (pref === 'dark') document.documentElement.classList.add('theme-dark')
          // "system" or absent or invalid → no class; CSS @media governs.
        } catch (_) {
          // localStorage unavailable (private browsing) — graceful fallback.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
