services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: cuttlegate
      POSTGRES_PASSWORD: cuttlegate
      POSTGRES_DB: cuttlegate
    ports:
      - "5432:5432"
    volumes:
      - cuttlegate_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuttlegate"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  cuttlegate_dev_data:
