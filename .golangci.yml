version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
  settings:
    errcheck:
      exclude-functions:
        - (github.com/golang-migrate/migrate/v4.Migrate).Close
        - (*database/sql.Rows).Close
    revive:
      rules:
        - name: exported
          disabled: true

formatters:
  enable:
    - goimports
